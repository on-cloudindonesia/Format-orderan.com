<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>On Cloud Indonesia</title>
  <style>
    * {box-sizing:border-box;}
    body {
      font-family: Arial;
      margin:0;
      background:#f5f5f5;
      display:flex;
      flex-direction:column;
      height:100vh;
      overflow:hidden;
    }

    header {
      background:#0b2c6b;
      color:white;
      text-align:center;
      padding:10px;
      font-size:14px;
    }

    marquee {
      background:#ffcc00;
      padding:6px;
      font-size:12px;
    }

    .container {
      padding:10px;
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:8px;
      flex:1;
    }

    .full {grid-column:1/3;}

    input, select, textarea {
      width:100%;
      padding:8px;
      border-radius:8px;
      border:1px solid #ccc;
      font-size:12px;
    }

    textarea {height:60px; resize:none;}

    .card {
      background:white;
      padding:8px;
      border-radius:10px;
      font-size:12px;
    }

    h3 {margin:4px 0; font-size:13px;}

    .btn {
      background:#1e3a8a;
      color:white;
      padding:12px;
      border:none;
      width:100%;
      border-radius:15px;
      font-size:14px;
      position:fixed;
      bottom:0;
      left:0;
    }
  </style>
</head>
<body>

<header>
  <strong>ON CLOUD INDONESIA</strong><br>
  Produk Original Swiss
</header>

<marquee>
  SELAMAT DATANG DI TOKO ON CLOUD TERPERCAYA ✨ AMAN & AMANAH 🙏 GARANSI UANG KEMBALI JIKA KW
</marquee>

<div class="container">

<div class="card full" style="background:#eaf2ff; font-weight:bold; text-align:center;">
✈️ Pengiriman: Estimasi 2-3 hari
</div>

<div class="card">
<h3>Nama</h3>
<input type="text" placeholder="Nama">
</div>

<div class="card">
<h3>WA</h3>
<input type="text" placeholder="08xxx">
</div>

<div class="card full">
<h3>Alamat + Kode Pos</h3>
<textarea placeholder="Alamat lengkap"></textarea>
</div>

<div class="card">
<h3>Warna</h3>
<select>
  <option>Hitam</option>
  <option>Putih</option>
  <option>Abu</option>
  <option>Navy</option>
</select>
</div>

<div class="card">
<h3>Ukuran</h3>
<select>
  <option>36-48</option>
</select>
</div>

<div class="card">
<h3>Jumlah</h3>
<input type="number" min="1" max="12" value="1">
</div>

<div class="card">
<h3>Pembayaran</h3>
<select>
  <option>BCA</option>
  <option>BRI</option>
  <option>Mandiri</option>
  <option>BNI</option>
  <option>DANA</option>
  <option>OVO</option>
  <option>GoPay</option>
  <option>ShopeePay</option>
</select>
</div>

<div class="card full">
<h3>Harga</h3>
<strong>Rp 799.000</strong>
</div>

</div>

<button class="btn" onclick="kirimWA()">LANJUT</button>

<script>
function kirimWA(){
  var nama = document.querySelector('input[placeholder="Nama"]').value;
  var wa = document.querySelector('input[placeholder="08xxx"]').value;
  var alamat = document.querySelector('textarea').value;
  var warna = document.querySelectorAll('select')[0].value;
  var ukuran = document.querySelectorAll('select')[1].value;
  var jumlah = document.querySelector('input[type="number"]').value;
  var bayar = document.querySelectorAll('select')[2].value;

  var text = "*ORDER ON CLOUD INDONESIA*%0A"+
             "Nama: "+nama+"%0A"+
             "No WA: "+wa+"%0A"+
             "Alamat: "+alamat+"%0A"+
             "Warna: "+warna+"%0A"+
             "Ukuran: "+ukuran+"%0A"+
             "Jumlah: "+jumlah+"%0A"+
             "Pembayaran: "+bayar+"%0A"+
             "Harga: Rp 799.000";

  window.open("https://wa.me/6285119265951?text="+text, '_blank');
}
</script>

</body>
</html>
